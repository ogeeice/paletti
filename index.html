<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALETTI - Color Harmony Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        * {
            font-family: 'Montserrat', sans-serif !important;
        }
    </style>
</head>
<body class="min-h-screen bg-[#e9eef6] text-zinc-900 dark:bg-[#1f1f1f] dark:text-zinc-50 transition-colors duration-300 p-6 md:p-10 flex flex-col items-center justify-between">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 bg-zinc-900 text-white dark:bg-white dark:text-zinc-900 px-4 py-2.5 rounded-xl text-xs font-semibold shadow-xl z-50 transition-all duration-300 transform -translate-y-20 opacity-0 pointer-events-none">
        Copied
    </div>

    <!-- Container Wrap -->
    <div class="w-full max-w-7xl mx-auto flex-grow flex flex-col justify-center items-center">
        
        <!-- Modern Minimal Header -->
        <header class="w-full max-w-xs flex justify-between items-center mb-6">
            <h1 class="text-xl font-black tracking-tighter text-zinc-900 dark:text-white">PALETTI</h1>
            <div class="flex gap-3">
                <button 
                    id="theme-toggle"
                    class="p-3 rounded-xl bg-zinc-100 dark:bg-[#2a2a2a] text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-colors"
                    title="Toggle Theme"
                >
                    <svg id="sun-icon" class="w-5 h-5 text-amber-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/>
                    </svg>
                    <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>

                <button 
                    id="export-btn"
                    class="p-3 rounded-xl bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 hover:opacity-85 active:scale-95 transition-all shadow-sm"
                    title="Export Options"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Workspace Column Layout -->
        <main class="w-full max-w-xs flex flex-col items-center gap-6">
            
            <!-- Razor Sharp canvas color selector -->
            <div class="relative">
                <canvas 
                    id="color-wheel"
                    class="rounded-full w-[300px] h-[300px] cursor-crosshair touch-none"
                ></canvas>
            </div>

            <!-- Dynamic Color Palette Row -->
            <div class="w-[300px]">
                <div id="palette-grid" class="grid grid-cols-5 gap-2 w-full"></div>
            </div>

            <!-- Minimal flat base seed hex configuration & Random generation -->
            <div class="w-full border-t border-zinc-400 dark:border-zinc-700 pt-5">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 mb-2.5 text-center">Base Seed Color</label>
                <div class="flex gap-2">
                    <input 
                        type="text" 
                        id="base-hex-input"
                        placeholder="#3399FF"
                        className="flex-grow px-3.5 py-2.5 text-xs font-semibold font-mono uppercase bg-zinc-100 hover:bg-zinc-200/50 dark:bg-[#2a2a2a] dark:hover:bg-[#333] text-zinc-900 dark:text-zinc-100 rounded-lg outline-none text-center transition-all border-none"
                        class="flex-grow px-3.5 py-2.5 text-xs font-semibold font-mono uppercase bg-zinc-100 dark:bg-[#2a2a2a] text-zinc-900 dark:text-zinc-100 rounded-lg outline-none text-center transition-all border-none"
                    />
                    <button 
                        id="random-btn"
                        class="px-4 py-2.5 rounded-lg bg-zinc-100 hover:bg-zinc-200 dark:bg-[#2a2a2a] dark:hover:bg-[#333] text-xs font-bold uppercase tracking-wider text-zinc-800 dark:text-zinc-200 transition-colors border-none"
                    >
                        Random
                    </button>
                </div>
            </div>

            <!-- Minimal flat harmony selector dropdown -->
            <div class="w-full border-t border-zinc-400 dark:border-zinc-700 pt-5">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500 mb-2.5 text-center">Harmony Rule</label>
                <div class="relative w-full">
                    <select 
                        id="harmony-select"
                        class="w-full px-3.5 py-2.5 text-xs font-semibold rounded-lg bg-zinc-100 hover:bg-zinc-200/50 dark:bg-[#2a2a2a] dark:hover:bg-[#333] text-zinc-900 dark:text-zinc-100 outline-none cursor-pointer text-center appearance-none border-none transition-colors"
                    >
                        <option value="analogous">ANALOGOUS</option>
                        <option value="monochromatic">MONOCHROMATIC</option>
                        <option value="complementary">COMPLEMENTARY</option>
                        <option value="split">SPLIT COMPLEMENTARY</option>
                        <option value="triadic">TRIADIC</option>
                        <option value="tetradic">TETRADIC</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-3.5 flex items-center text-zinc-400 dark:text-zinc-500">
                        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                        </svg>
                    </div>
                </div>
            </div>

        </main>

    </div>

    <!-- FOOTER -->
    <footer class="w-full py-6 mt-12 border-t border-zinc-400 dark:border-zinc-800 text-center">
        <p class="text-[11px] text-zinc-400 dark:text-zinc-500 font-medium">
            Paletti color generator workspace. All calculations processed mathematically.
        </p>
    </footer>

    <!-- Export Overlay Modal -->
    <div id="export-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden">
        <div id="modal-container" class="bg-white dark:bg-[#202020] p-6 rounded-2xl shadow-xl w-full max-w-xs text-center border border-zinc-100/10 dark:border-zinc-800/10 scale-95 opacity-0 transition-all duration-300">
            <p class="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-4">Export Options</p>
            <div class="flex flex-col gap-2">
                <button 
                    id="download-png-btn"
                    class="w-full py-2.5 px-4 rounded-lg bg-zinc-100 hover:bg-zinc-200 dark:bg-[#2d2d2d] dark:hover:bg-[#3a3a3a] text-xs font-bold transition-colors"
                >
                    Download PNG
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        let baseH = 210;
        let baseS = 80;
        let baseL = 55;
        let baseHexInput = '#3399FF';
        let harmony = 'analogous';
        let palette = [];
        const lockedSlots = [false, false, false, false, false];
        let isDarkMode = true;

        // --- DOM Elements ---
        const canvas = document.getElementById('color-wheel');
        const ctx = canvas.getContext('2d');
        const paletteGrid = document.getElementById('palette-grid');
        const baseHexInputEl = document.getElementById('base-hex-input');
        const randomBtn = document.getElementById('random-btn');
        const harmonySelect = document.getElementById('harmony-select');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const exportBtn = document.getElementById('export-btn');
        const exportModal = document.getElementById('export-modal');
        const modalContainer = document.getElementById('modal-container');
        const downloadPngBtn = document.getElementById('download-png-btn');
        const toastEl = document.getElementById('toast');

        let isDragging = false;

        // --- Color Conversion Utilities ---
        function hslToRgb(h, s, l) {
            s /= 100; l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
            return { r: Math.round(255 * f(0)), g: Math.round(255 * f(8)), b: Math.round(255 * f(4)) };
        }

        function rgbToHex(r, g, b) {
            return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join("");
        }

        function hslToHex(h, s, l) {
            const { r, g, b } = hslToRgb(h, s, l);
            return rgbToHex(r, g, b);
        }

        function hexToRgb(hex) {
            const shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            const fullHex = hex.replace(shorthandRegex, (m, r, g, b) => r + r + g + g + b + b);
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(fullHex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        // --- Alert System ---
        function showToast(message) {
            toastEl.innerText = message;
            toastEl.classList.remove('opacity-0', '-translate-y-20', 'pointer-events-none');
            toastEl.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toastEl.classList.remove('opacity-100', 'translate-y-0');
                toastEl.classList.add('opacity-0', '-translate-y-20', 'pointer-events-none');
            }, 2000);
        }

        function handleCopy(text) {
            const input = document.createElement('input');
            input.setAttribute('value', text);
            document.body.appendChild(input);
            input.select();
            const result = document.execCommand('copy');
            document.body.removeChild(input);
            if (result) {
                showToast(`Copied ${text}`);
            }
        }

        function toggleLock(idx) {
            lockedSlots[idx] = !lockedSlots[idx];
            generatePalette();
        }

        // --- Palette Generation Logic ---
        function generatePalette() {
            let coords = [];
            switch (harmony) {
                case 'monochromatic': 
                    coords = [
                        [baseH, baseS * 0.4, Math.min(baseL + 30, 95)], 
                        [baseH, baseS * 0.7, Math.min(baseL + 15, 88)], 
                        [baseH, baseS, baseL], 
                        [baseH, baseS * 1.1, Math.max(baseL - 15, 12)], 
                        [baseH, baseS * 1.2, Math.max(baseL - 30, 6)]
                    ]; 
                    break;
                case 'analogous': 
                    coords = [
                        [(baseH - 45 + 360) % 360, baseS * 0.9, baseL], 
                        [(baseH - 22 + 360) % 360, baseS * 0.95, baseL], 
                        [baseH, baseS, baseL], 
                        [(baseH + 22) % 360, baseS * 0.95, baseL], 
                        [(baseH + 45) % 360, baseS * 0.9, baseL]
                    ]; 
                    break;
                case 'complementary': 
                    coords = [
                        [baseH, baseS, Math.min(baseL + 20, 90)], 
                        [baseH, baseS, baseL], 
                        [baseH, baseS * 0.8, Math.max(baseL - 20, 15)], 
                        [(baseH + 180) % 360, baseS, baseL], 
                        [(baseH + 180) % 360, baseS * 0.8, Math.max(baseL - 20, 15)]
                    ]; 
                    break;
                case 'split': 
                    coords = [
                        [baseH, baseS, baseL], 
                        [(baseH + 150) % 360, baseS, baseL], 
                        [(baseH + 150) % 360, baseS * 0.8, Math.max(baseL - 15, 15)], 
                        [(baseH + 210) % 360, baseS, baseL], 
                        [(baseH + 210) % 360, baseS * 0.8, Math.max(baseL - 15, 15)]
                    ]; 
                    break;
                case 'triadic': 
                    coords = [
                        [baseH, baseS, baseL], 
                        [(baseH + 120) % 360, baseS, baseL], 
                        [(baseH + 120) % 360, baseS * 0.8, Math.max(baseL - 15, 15)], 
                        [(baseH + 240) % 360, baseS, baseL], 
                        [(baseH + 240) % 360, baseS * 0.8, Math.max(baseL - 15, 15)]
                    ]; 
                    break;
                case 'tetradic': 
                    coords = [
                        [baseH, baseS, baseL], 
                        [(baseH + 90) % 360, baseS, baseL], 
                        [(baseH + 180) % 360, baseS, baseL], 
                        [(baseH + 270) % 360, baseS, baseL], 
                        [baseH, baseS * 0.4, Math.min(baseL + 25, 90)]
                    ]; 
                    break;
                default: 
                    coords = Array(5).fill([baseH, baseS, baseL]);
            }

            palette = coords.map(([h, s, l], i) => {
                if (lockedSlots[i] && palette[i]) {
                    return palette[i];
                }
                return { hex: hslToHex(h, s, l), h: Math.round(h), s: Math.round(s), l: Math.round(l) };
            });

            baseHexInputEl.value = hslToHex(baseH, baseS, baseL);
            renderSwatches();
            renderColorWheel();
        }

        // --- Render grid color blocks ---
        function renderSwatches() {
            paletteGrid.innerHTML = '';
            palette.forEach((c, i) => {
                const slotIsLight = c.l > 60;
                
                const swatchContainer = document.createElement('div');
                swatchContainer.className = "relative aspect-square w-full rounded-lg cursor-pointer group shadow-sm border border-zinc-100/10 dark:border-zinc-800/10 transition-transform active:scale-95";
                swatchContainer.style.backgroundColor = c.hex;
                swatchContainer.addEventListener('click', () => handleCopy(c.hex));

                // Locks container overlay
                const lockContainer = document.createElement('div');
                lockContainer.className = "absolute inset-0 flex items-center justify-center";

                const lockBtn = document.createElement('button');
                lockBtn.className = `transition-all ${
                    lockedSlots[i] 
                        ? 'scale-110 opacity-100' 
                        : 'opacity-0 group-hover:opacity-100 hover:scale-110'
                } ${slotIsLight ? 'text-zinc-900/90' : 'text-white/95'}`;
                lockBtn.title = lockedSlots[i] ? "Unlock Color" : "Lock Color";
                lockBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleLock(i);
                });

                // Set premium MIT/CC0 unlocked/locked padlock vectors natively
                if (lockedSlots[i]) {
                    lockBtn.innerHTML = `
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                        </svg>
                    `;
                } else {
                    lockBtn.innerHTML = `
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 119 0v3.75M3.75 21.75h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H3.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
                        </svg>
                    `;
                }

                lockContainer.appendChild(lockBtn);
                swatchContainer.appendChild(lockContainer);
                paletteGrid.appendChild(swatchContainer);
            });
        }

        // --- High-DPI Sharp Canvas Color Wheel Renderer ---
        function renderColorWheel() {
            const displayWidth = 300;
            const displayHeight = 300;
            const dpr = window.devicePixelRatio || 1;

            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
            canvas.width = displayWidth * dpr;
            canvas.height = displayHeight * dpr;

            ctx.scale(dpr, dpr);

            const cx = displayWidth / 2;
            const cy = displayHeight / 2;
            const outerRadius = Math.min(cx, cy) - 6;

            ctx.clearRect(0, 0, displayWidth, displayHeight);

            const imgData = ctx.createImageData(canvas.width, canvas.height);
            const data = imgData.data;

            for (let py = 0; py < canvas.height; py++) {
                for (let px = 0; px < canvas.width; px++) {
                    const rx = px / dpr;
                    const ry = py / dpr;

                    const dx = rx - cx;
                    const dy = ry - cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist <= outerRadius) {
                        const angle = Math.atan2(dy, dx);
                        const hue = (angle * 180 / Math.PI + 360) % 360;
                        const saturation = dist / outerRadius;
                        const rgb = hslToRgb(hue, saturation * 100, baseL);

                        const idx = (py * canvas.width + px) * 4;
                        data[idx] = rgb.r;
                        data[idx + 1] = rgb.g;
                        data[idx + 2] = rgb.b;
                        data[idx + 3] = 255;
                    }
                }
            }

            ctx.putImageData(imgData, 0, 0);

            // Draw Outer Wheel Ring Boundary
            ctx.beginPath();
            ctx.arc(cx, cy, outerRadius, 0, 2 * Math.PI);
            ctx.strokeStyle = isDarkMode ? 'rgba(255, 255, 255, 0.15)' : 'rgba(0, 0, 0, 0.08)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 1. Draw Harmony Dynamic Geometric Vector Lines
            if (palette && palette.length > 0) {
                ctx.beginPath();
                palette.forEach((color, idx) => {
                    const angleRad = (color.h * Math.PI) / 180;
                    const dist = (color.s / 100) * outerRadius;
                    const x = cx + Math.cos(angleRad) * dist;
                    const y = cy + Math.sin(angleRad) * dist;
                    if (idx === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                if (['triadic', 'tetradic', 'split', 'complementary'].includes(harmony)) {
                    ctx.closePath();
                }
                ctx.strokeStyle = isDarkMode ? 'rgba(255, 255, 255, 0.35)' : 'rgba(0, 0, 0, 0.25)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 2. Draw Multi-node Indicators for All Harmonized Colors
            if (palette && palette.length > 0) {
                palette.forEach((color) => {
                    const angleRad = (color.h * Math.PI) / 180;
                    const dist = (color.s / 100) * outerRadius;
                    const x = cx + Math.cos(angleRad) * dist;
                    const y = cy + Math.sin(angleRad) * dist;

                    const isMasterSeed = Math.abs(color.h - baseH) < 1.5 && Math.abs(color.s - baseS) < 1.5;

                    ctx.fillStyle = color.hex;
                    ctx.beginPath();
                    ctx.arc(x, y, isMasterSeed ? 8 : 4.5, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.strokeStyle = isMasterSeed ? '#ffffff' : 'rgba(255, 255, 255, 0.9)';
                    ctx.lineWidth = isMasterSeed ? 2.5 : 1.5;
                    ctx.beginPath();
                    ctx.arc(x, y, isMasterSeed ? 8 : 4.5, 0, 2 * Math.PI);
                    ctx.stroke();

                    ctx.strokeStyle = isMasterSeed ? 'rgba(0, 0, 0, 0.25)' : 'rgba(0, 0, 0, 0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(x, y, isMasterSeed ? 9.5 : 5.5, 0, 2 * Math.PI);
                    ctx.stroke();
                });
            }
        }

        // --- Interaction Coordination ---
        const handleInteraction = (clientX, clientY) => {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left - rect.width / 2;
            const y = clientY - rect.top - rect.height / 2;
            const dist = Math.sqrt(x * x + y * y);

            baseH = Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
            baseS = Math.round(Math.min(1, dist / (rect.width / 2 - 6)) * 100);
            
            generatePalette();
        };

        // --- Event Listeners ---
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            handleInteraction(e.clientX, e.clientY);
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) handleInteraction(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            if (e.touches[0]) {
                handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches[0]) {
                handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Seed manual change handler
        baseHexInputEl.addEventListener('input', (e) => {
            handleBaseHexInputChange(e.target.value);
        });

        // Instant Selection Utilities on Double-Click & Focus
        baseHexInputEl.addEventListener('dblclick', (e) => e.target.select());
        baseHexInputEl.addEventListener('focus', (e) => e.target.select());

        randomBtn.addEventListener('click', () => {
            const hueShift = Math.floor(Math.random() * 31) - 15;
            baseH = (baseH + hueShift + 360) % 360;
            baseS = Math.floor(Math.random() * 31) + 50;  
            baseL = Math.floor(Math.random() * 21) + 40;  
            generatePalette();
            showToast("Generated variation within color family!");
        });

        harmonySelect.addEventListener('change', (e) => {
            harmony = e.target.value;
            generatePalette();
        });

        themeToggleBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            sunIcon.classList.toggle('hidden', !isDarkMode);
            moonIcon.classList.toggle('hidden', isDarkMode);
            generatePalette();
        });

        // --- Export Modal Coordination ---
        exportBtn.addEventListener('click', () => {
            exportModal.classList.remove('hidden');
            setTimeout(() => {
                modalContainer.classList.remove('scale-95', 'opacity-0');
                modalContainer.classList.add('scale-100', 'opacity-100');
            }, 10);
        });

        function closeModal() {
            modalContainer.classList.remove('scale-100', 'opacity-100');
            modalContainer.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                exportModal.classList.add('hidden');
            }, 300);
        }

        exportModal.addEventListener('click', (e) => {
            if (e.target === exportModal) {
                closeModal();
            }
        });

        // --- Export PNG Generator (Spec Sheet Document Download) ---
        downloadPngBtn.addEventListener('click', () => {
            const downloadCanvas = document.createElement('canvas');
            downloadCanvas.width = 1000;
            downloadCanvas.height = 600;
            const dCtx = downloadCanvas.getContext('2d');

            dCtx.fillStyle = isDarkMode ? '#1f1f1f' : '#e9eef6';
            dCtx.fillRect(0, 0, downloadCanvas.width, downloadCanvas.height);

            const blockWidth = 140;
            const blockHeight = 240;
            const startX = (downloadCanvas.width - (5 * blockWidth + 4 * 20)) / 2;
            const blockY = 180;

            palette.forEach((color, idx) => {
                const currentX = startX + idx * (blockWidth + 20);
                dCtx.fillStyle = color.hex;
                dCtx.beginPath();
                dCtx.roundRect(currentX, blockY, blockWidth, blockHeight, 12);
                dCtx.fill();

                dCtx.fillStyle = isDarkMode ? '#ffffff' : '#121212';
                dCtx.font = 'bold 16px "Montserrat"';
                dCtx.fillText(color.hex, currentX + 15, blockY + blockHeight + 40);
            });

            const imgUrl = downloadCanvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = imgUrl;
            a.download = `paletti-${harmony}.png`;
            a.click();
            closeModal();
        });

        // Initial setup execution
        generatePalette();
    </script>
</body>
</html>
